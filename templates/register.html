{% extends "layout.html" %}
{% block title %}注册{% endblock %}
{% block content %}

<div class="login-box" style="max-width:440px">
  <h1>注册账号</h1>
  <div class="card">
    {% if error %}
    <div style="background:#fff2f0;border:1px solid #ffccc7;color:#ff4d4f;padding:8px 12px;border-radius:6px;margin-bottom:16px;font-size:.85rem">{{ error }}</div>
    {% endif %}

    <!-- Role selector -->
    <div style="display:flex;gap:8px;margin-bottom:18px">
      <button type="button" id="tab-student" class="btn" style="flex:1;padding:10px"
              onclick="switchRole('student')">我是学生</button>
      <button type="button" id="tab-teacher" class="btn" style="flex:1;padding:10px"
              onclick="switchRole('teacher')">我是老师</button>
    </div>

    <form method="POST">
      <input type="hidden" name="role" id="role-input" value="student">

      <div class="form-group">
        <label>姓名</label>
        <input type="text" name="realname" class="form-control" placeholder="你的真实姓名" required>
      </div>
      <div class="form-group">
        <label>账号</label>
        <input type="text" name="username" class="form-control" placeholder="字母、数字、下划线，3-20位" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" class="form-control" placeholder="至少4位" required>
      </div>

      <!-- Student: pick existing class -->
      <div class="form-group" id="group-class-select">
        <label>选择班级</label>
        <select name="class_id" class="form-control">
          <option value="">-- 请选择 --</option>
          {% for c in classes %}
          <option value="{{ c.id }}">{{ c.name }} (班主任: {{ c.homeroom_name or '未指定' }})</option>
          {% endfor %}
        </select>
        {% if not classes %}
        <div class="text-muted" style="margin-top:6px;font-size:.78rem">暂无班级，请等老师先创建</div>
        {% endif %}
      </div>

      <!-- Teacher: secret registration code -->
      <div class="form-group" id="group-teacher-code" style="display:none">
        <label>老师注册密钥</label>
        <input type="password" name="teacher_code" class="form-control" placeholder="请输入老师注册密钥">
        <div class="text-muted" style="margin-top:4px;font-size:.78rem">只有知道密钥的老师才能注册</div>
      </div>

      <!-- Teacher: create new class -->
      <div class="form-group" id="group-class-create" style="display:none">
        <label>新建班级名称</label>
        <input type="text" name="class_name" class="form-control" placeholder="如: 软件技术2301班">
        <div class="text-muted" style="margin-top:4px;font-size:.78rem">注册后你将自动成为这个班的班主任</div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:10px">注 册</button>
    </form>
  </div>
  <div class="text-muted" style="text-align:center;margin-top:12px;font-size:.82rem">
    已有账号? <a href="/login">登录</a>
  </div>
</div>

<script>
function switchRole(role) {
  document.getElementById('role-input').value = role;

  const tabS = document.getElementById('tab-student');
  const tabT = document.getElementById('tab-teacher');

  if (role === 'teacher') {
    tabT.style.background = '#1677ff'; tabT.style.color = '#fff';
    tabS.style.background = '#fff'; tabS.style.color = '#333'; tabS.style.border = '1px solid #d9d9d9';
    document.getElementById('group-class-select').style.display = 'none';
    document.getElementById('group-teacher-code').style.display = 'block';
    document.getElementById('group-class-create').style.display = 'block';
  } else {
    tabS.style.background = '#1677ff'; tabS.style.color = '#fff';
    tabT.style.background = '#fff'; tabT.style.color = '#333'; tabT.style.border = '1px solid #d9d9d9';
    document.getElementById('group-class-select').style.display = 'block';
    document.getElementById('group-teacher-code').style.display = 'none';
    document.getElementById('group-class-create').style.display = 'none';
  }
}

// Init: student tab active
switchRole('student');
</script>
{% endblock %}
