{% extends "layout.html" %}
{% block title %}登录 - 作业提交批改系统{% endblock %}
{% block content %}
<div class="login-box">
  <h1>实训作业系统</h1>
  <div class="card">
    <form method="POST">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <div class="form-group">
        <label>账号</label>
        <input type="text" name="username" class="form-control" placeholder="请输入账号" required autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:10px">登 录</button>
    </form>
  </div>
  <div class="text-muted" style="text-align:center;margin-top:16px;font-size:.85rem">
    还没有账号？<a href="/register">立即注册</a>
  </div>
</div>
{% endblock %}
